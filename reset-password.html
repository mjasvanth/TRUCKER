<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAMIL TRUCKER - Create New Password</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23007bff'/%3E%3Cpath d='M30 60 L30 40 L50 30 L70 40 L70 60' stroke='%23fff' stroke-width='3' fill='none'/%3E%3Ccircle cx='35' cy='70' r='6' fill='%23fff'/%3E%3Ccircle cx='65' cy='70' r='6' fill='%23fff'/%3E%3Crect x='50' y='35' width='15' height='12' fill='%23fff' opacity='0.7'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <style>
        .reset-password-section {
            background: linear-gradient(135deg, #1a0f2e 0%, #2d1b4e 100%);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-password-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.2);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .reset-password-header {
            background: linear-gradient(135deg, #007bff 0%, #6366f1 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .reset-password-header h2 {
            margin: 0;
            font-size: 1.8rem;
        }

        .reset-password-header p {
            margin: 10px 0 0 0;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .reset-password-content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a0f2e;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            transition: opacity 0.3s;
        }

        .toggle-password:hover {
            opacity: 0.7;
        }

        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .strength-bar {
            width: 100%;
            height: 5px;
            background: #ddd;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            background: #dc3545;
            transition: width 0.3s;
        }

        .strength-fill.weak {
            background: #dc3545;
            width: 33%;
        }

        .strength-fill.fair {
            background: #ffc107;
            width: 66%;
        }

        .strength-fill.strong {
            background: #28a745;
            width: 100%;
        }

        .btn-reset {
            background: linear-gradient(135deg, #007bff 0%, #6366f1 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-reset:active {
            transform: translateY(0);
        }

        .btn-reset:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-login a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .back-to-login a:hover {
            color: #6366f1;
            text-decoration: underline;
        }

        .reset-info {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 600px) {
            .reset-password-header {
                padding: 30px 20px;
            }

            .reset-password-content {
                padding: 30px 20px;
            }

            .reset-password-header h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>TAMIL TRUCKER<span>REPAIR</span></h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html">Sign In</a>
            </nav>
        </div>
    </header>

    <section class="reset-password-section">
        <div class="reset-password-container">
            <div class="reset-password-header">
                <h2>🔑 Create New Password</h2>
                <p>Set a new password for your account</p>
            </div>

            <div class="reset-password-content">
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage">
                    ✓ Your password has been reset successfully! Redirecting to login...
                </div>

                <div class="reset-info" id="resetInfo">
                    <strong>Reset Code:</strong> <code id="resetCodeDisplay" style="background: white; padding: 2px 6px; border-radius: 3px;"></code>
                </div>

                <form id="newPasswordForm" onsubmit="handleNewPasswordSubmit(event)">
                    <div class="form-group">
                        <label for="resetCode">Reset Code</label>
                        <input type="text" id="resetCode" name="resetCode" placeholder="Enter the reset code from your email" required>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div style="position: relative;">
                            <input type="password" id="newPassword" name="newPassword" placeholder="Enter your new password" required oninput="checkPasswordStrength()">
                            <button type="button" class="toggle-password" onclick="toggleNewPasswordVisibility()" title="Show/Hide password">
                                <span id="passwordToggleIcon">👁️</span>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span id="strengthText">Strength: Weak</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div style="position: relative;">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                            <button type="button" class="toggle-password" onclick="toggleConfirmPasswordVisibility()" title="Show/Hide password">
                                <span id="confirmToggleIcon">👁️</span>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-reset" id="submitBtn">Reset Password</button>
                </form>

                <div class="back-to-login">
                    <p><a href="forgot-password.html">← Back to Forgot Password</a></p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 TAMIL TRUCKER. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Initialize page with URL parameters
        function initResetPasswordPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const resetCode = urlParams.get('code');
            const email = urlParams.get('email');

            if (resetCode) {
                document.getElementById('resetCode').value = resetCode;
                document.getElementById('resetCodeDisplay').textContent = resetCode;
            }

            if (email) {
                const resetInfo = document.getElementById('resetInfo');
                resetInfo.innerHTML += `<br><strong>Email:</strong> <code style="background: white; padding: 2px 6px; border-radius: 3px;">${email}</code>`;
                sessionStorage.setItem('resetEmail', email);
            }
        }

        // Check password strength
        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            strengthFill.className = 'strength-fill';
            if (strength <= 2) {
                strengthFill.classList.add('weak');
                strengthText.textContent = 'Strength: Weak';
            } else if (strength <= 3) {
                strengthFill.classList.add('fair');
                strengthText.textContent = 'Strength: Fair';
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = 'Strength: Strong';
            }
        }

        // Toggle new password visibility
        function toggleNewPasswordVisibility() {
            const field = document.getElementById('newPassword');
            const icon = document.getElementById('passwordToggleIcon');

            if (field.type === 'password') {
                field.type = 'text';
                icon.textContent = '🔓';
            } else {
                field.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // Toggle confirm password visibility
        function toggleConfirmPasswordVisibility() {
            const field = document.getElementById('confirmPassword');
            const icon = document.getElementById('confirmToggleIcon');

            if (field.type === 'password') {
                field.type = 'text';
                icon.textContent = '🔓';
            } else {
                field.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // Handle new password form submission
        function handleNewPasswordSubmit(event) {
            event.preventDefault();

            const resetCode = document.getElementById('resetCode').value.trim();
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');

            // Clear messages
            errorMessage.style.display = 'none';
            errorMessage.textContent = '';
            successMessage.style.display = 'none';

            // Validate
            if (!resetCode || !newPassword || !confirmPassword) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = '❌ Please fill in all fields';
                return;
            }

            if (newPassword.length < 6) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = '❌ Password must be at least 6 characters';
                return;
            }

            if (newPassword !== confirmPassword) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = '❌ Passwords do not match';
                return;
            }

            // Check if reset code matches any reset request
            const resetRequests = JSON.parse(localStorage.getItem('resetRequests') || '[]');
            const resetRequest = resetRequests.find(r => r.resetCode === resetCode && !r.expired);

            if (!resetRequest) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = '❌ Invalid or expired reset code';
                return;
            }

            // Find user by email
            const users = getRegisteredUsers();
            const userIndex = users.findIndex(u => u.email.toLowerCase() === resetRequest.email.toLowerCase());

            if (userIndex === -1) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = '❌ User not found';
                return;
            }

            // Update user password
            users[userIndex].password = newPassword;
            users[userIndex].passwordResetAt = new Date().toLocaleString();
            saveRegisteredUsers(users);

            // Mark reset code as expired
            resetRequest.expired = true;
            localStorage.setItem('resetRequests', JSON.stringify(resetRequests));

            // Log for admin
            const adminNotification = {
                type: 'password_reset_success',
                email: resetRequest.email,
                resetTime: new Date().toISOString()
            };
            storeAdminNotification(adminNotification);

            // Show success message and redirect
            submitBtn.disabled = true;
            successMessage.style.display = 'block';

            setTimeout(function() {
                window.location.href = 'login.html';
            }, 3000);
        }

        // Initialize page on load
        document.addEventListener('DOMContentLoaded', initResetPasswordPage);
    </script>
