<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAMIL TRUCKER - Set New Password</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23007bff'/%3E%3Cpath d='M30 60 L30 40 L50 30 L70 40 L70 60' stroke='%23fff' stroke-width='3' fill='none'/%3E%3Ccircle cx='35' cy='70' r='6' fill='%23fff'/%3E%3Ccircle cx='65' cy='70' r='6' fill='%23fff'/%3E%3Crect x='50' y='35' width='15' height='12' fill='%23fff' opacity='0.7'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <style>
        .reset-password-section {
            background: linear-gradient(135deg, #1a0f2e 0%, #2d1b4e 100%);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-password-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.2);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .reset-password-header {
            background: linear-gradient(135deg, #007bff 0%, #6366f1 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .reset-password-header h2 {
            margin: 0;
            font-size: 1.8rem;
        }

        .reset-password-header p {
            margin: 10px 0 0 0;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .reset-password-content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a0f2e;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 38px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            transition: opacity 0.3s;
        }

        .password-toggle:hover {
            opacity: 0.7;
        }

        .password-strength {
            font-size: 0.85rem;
            margin-top: 5px;
            padding: 8px;
            border-radius: 3px;
            display: none;
        }

        .password-strength.weak {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .password-strength.fair {
            background: #fff3cd;
            color: #856404;
            display: block;
        }

        .password-strength.good {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .btn-reset {
            background: linear-gradient(135deg, #007bff 0%, #6366f1 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 10px;
        }

        .btn-reset:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-reset:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-reset:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid;
        }

        .message.success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            display: block;
        }

        .message.warning {
            background: #fff3cd;
            border-color: #ffeeba;
            color: #856404;
            display: block;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-login a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .back-to-login a:hover {
            color: #6366f1;
            text-decoration: underline;
        }

        .requirements {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .requirements h4 {
            margin: 0 0 10px 0;
            color: #1a0f2e;
        }

        .requirements ul {
            margin: 0;
            padding-left: 20px;
            color: #666;
        }

        .requirements li {
            margin-bottom: 5px;
        }

        .requirements .met {
            color: #155724;
        }

        @media (max-width: 600px) {
            .reset-password-header {
                padding: 30px 20px;
            }

            .reset-password-content {
                padding: 30px 20px;
            }

            .reset-password-header h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>TAMIL TRUCKER<span>REPAIR</span></h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html">Sign In</a>
            </nav>
        </div>
    </header>

    <section class="reset-password-section">
        <div class="reset-password-container">
            <div class="reset-password-header">
                <h2>🔑 Set Your New Password</h2>
                <p>Create a strong password for your account</p>
            </div>

            <div class="reset-password-content">
                <div id="messageContainer" class="message"></div>

                <div class="requirements">
                    <h4>Password Requirements:</h4>
                    <ul>
                        <li id="req-length">✗ At least 8 characters</li>
                        <li id="req-uppercase">✗ One uppercase letter (A-Z)</li>
                        <li id="req-lowercase">✗ One lowercase letter (a-z)</li>
                        <li id="req-number">✗ One number (0-9)</li>
                    </ul>
                </div>

                <form id="resetPasswordForm" onsubmit="handlePasswordReset(event)">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div style="position: relative;">
                            <input type="password" id="newPassword" name="password" required placeholder="Enter your new password" oninput="checkPasswordStrength()">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('newPassword', 'passwordToggleIcon')" title="Show/Hide password">
                                <span id="passwordToggleIcon">👁️</span>
                            </button>
                        </div>
                        <div id="passwordStrength" class="password-strength"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div style="position: relative;">
                            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter your password" oninput="checkPasswordMatch()">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmPassword', 'confirmToggleIcon')" title="Show/Hide password">
                                <span id="confirmToggleIcon">👁️</span>
                            </button>
                        </div>
                        <div id="passwordMatch" class="password-strength"></div>
                    </div>

                    <button type="submit" class="btn-reset" id="submitBtn">Update Password</button>
                </form>

                <div class="back-to-login">
                    <p><a href="login.html">← Back to Sign In</a></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api'; // Update this URL as needed

        // Get token and email from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        const resetEmail = urlParams.get('email');

        // Check if token and email are present
        window.addEventListener('DOMContentLoaded', () => {
            if (!resetToken || !resetEmail) {
                showMessage('Invalid or missing reset link. Please request a new password reset.', 'error');
                document.getElementById('resetPasswordForm').style.display = 'none';
            }
        });

        function togglePasswordVisibility(fieldId, iconId) {
            const field = document.getElementById(fieldId);
            const icon = document.getElementById(iconId);
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.textContent = '👁️‍🗨️';
            } else {
                field.type = 'password';
                icon.textContent = '👁️';
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            let strength = 0;
            
            // Check requirements
            const hasLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            // Update requirement indicators
            updateRequirement('req-length', hasLength);
            updateRequirement('req-uppercase', hasUppercase);
            updateRequirement('req-lowercase', hasLowercase);
            updateRequirement('req-number', hasNumber);
            
            // Calculate strength
            if (hasLength) strength++;
            if (hasUppercase) strength++;
            if (hasLowercase) strength++;
            if (hasNumber) strength++;
            
            // Show strength indicator
            if (password.length === 0) {
                strengthDiv.style.display = 'none';
            } else if (strength <= 2) {
                strengthDiv.className = 'password-strength weak';
                strengthDiv.textContent = '⚠️ Weak password - Please add more variety';
            } else if (strength === 3) {
                strengthDiv.className = 'password-strength fair';
                strengthDiv.textContent = '⚡ Fair password - Consider adding more complexity';
            } else {
                strengthDiv.className = 'password-strength good';
                strengthDiv.textContent = '✓ Strong password';
            }
            
            checkPasswordMatch();
        }

        function updateRequirement(id, met) {
            const elem = document.getElementById(id);
            if (met) {
                elem.classList.add('met');
                elem.textContent = '✓ ' + elem.textContent.substring(2);
            } else {
                elem.classList.remove('met');
                elem.textContent = '✗ ' + elem.textContent.substring(2);
            }
        }

        function checkPasswordMatch() {
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirmPassword.length === 0) {
                matchDiv.style.display = 'none';
            } else if (password === confirmPassword) {
                matchDiv.className = 'password-strength good';
                matchDiv.textContent = '✓ Passwords match';
            } else {
                matchDiv.className = 'password-strength weak';
                matchDiv.textContent = '✗ Passwords do not match';
            }
        }

        function showMessage(message, type) {
            const messageContainer = document.getElementById('messageContainer');
            messageContainer.className = 'message ' + type;
            messageContainer.textContent = message;
        }

        async function handlePasswordReset(event) {
            event.preventDefault();
            
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // Validate
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters long', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Updating...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        email: resetEmail,
                        password: password,
                        confirmPassword: confirmPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to reset password');
                }

                // Show success message
                showMessage('✓ ' + (data.message || 'Password has been reset successfully!'), 'success');
                
                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                
            } catch (error) {
                console.error('Error:', error.message);
                showMessage('✗ ' + error.message, 'error');
                
            } finally {
                // Reset button state
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        }
    </script>
</body>
</html>
