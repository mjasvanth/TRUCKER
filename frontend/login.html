<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAMIL TRUCKER - Sign In</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff6600'/%3E%3Cpath d='M30 60 L30 40 L50 30 L70 40 L70 60' stroke='%23fff' stroke-width='3' fill='none'/%3E%3Ccircle cx='35' cy='70' r='6' fill='%23fff'/%3E%3Ccircle cx='65' cy='70' r='6' fill='%23fff'/%3E%3Crect x='50' y='35' width='15' height='12' fill='%23fff' opacity='0.7'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>TAMIL TRUCKER<span>REPAIR</span> </h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="index.html#services">Services</a>
            </nav>
        </div>
    </header>

    <section class="login-section">
        <div class="login-container">
            <div class="login-box">
                <h2>Sign In</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', 'passwordToggleIcon')" title="Show/Hide password">
                                <span id="passwordToggleIcon">👁️</span>
                            </button>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="form-group">
                        <label for="location">Location / City</label>
                        <input type="text" id="location" name="location" required placeholder="Enter your location">
                        <span class="error-message" id="locationError"></span>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <button type="submit" class="btn-login">Sign In</button>
                </form>

                <div class="login-footer">
                    <a href="forgot-password.html">Forgot Password?</a>
                </div>
            </div>

            <div class="signup-box">
                <h3>New to TAMIL TRUCKER?</h3>
                <p>Create an account to book services, track repairs, and manage your fleet.</p>
                <a href="signup.html" class="btn-signup">Create Account</a>
            </div>
        </div>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <script src="script.js"></script>

            storageBucket: "tamil-trucker.firebasestorage.app",
            messagingSenderId: "705729524984",
            appId: "1:705729524984:web:89d57c19d09bd8ba85f70d",

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        console.log("Firebase initialized with Analytics tracking");
    </script>
</body>
</html>
