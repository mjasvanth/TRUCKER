<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAMIL TRUCKER - Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff6600'/%3E%3Cpath d='M30 60 L30 40 L50 30 L70 40 L70 60' stroke='%23fff' stroke-width='3' fill='none'/%3E%3Ccircle cx='35' cy='70' r='6' fill='%23fff'/%3E%3Ccircle cx='65' cy='70' r='6' fill='%23fff'/%3E%3Crect x='50' y='35' width='15' height='12' fill='%23fff' opacity='0.7'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>TAMIL <span>TRUCKER</span> REPAIR</h1>
            <nav>
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <section class="login-section">
        <div class="login-container admin-login-container">
            <div class="login-box admin-login-box">
                <h2>Admin Login</h2>
                <p style="text-align: center; color: #666; margin-bottom: 20px;">Access Control Panel</p>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="adminEmail">Admin Email</label>
                        <input type="email" id="adminEmail" name="adminEmail" required placeholder="admin@trucktech.com">
                        <span class="error-message" id="adminEmailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="adminPassword">Admin Password</label>
                        <div style="position: relative;">
                            <input type="password" id="adminPassword" name="adminPassword" required placeholder="Enter admin password" autocomplete="current-password">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('adminPassword', 'adminPasswordToggleIcon')" title="Show/Hide password">
                                <span id="adminPasswordToggleIcon">👁️</span>
                            </button>
                        </div>
                        <span class="error-message" id="adminPasswordError"></span>
                    </div>

                    <button type="submit" class="btn-login">Access Admin Panel</button>
                </form>

                <div class="login-footer">
                    <p>Not an admin? <a href="login.html">User Login</a></p>
                    <p><a href="forgot-password.html">Forgot Password?</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
